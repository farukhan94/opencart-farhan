name: Deploy to Contabo VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/projects/opencart-farhan
            
            # Clean up logs and untracked files that cause "Abort" conflicts
            find upload/system/storage/logs -type f -not -name 'index.html' -delete
            
            # Force the update even if there are conflicts with config files
            git fetch origin main
            git stash
            git reset --hard origin/main
            git stash pop || true
            
            # Delete OpenCart Modification and System Cache to force use of new files
            find upload/system/storage/modification -type f -not -name 'index.html' -delete
            find upload/system/storage/cache -type f -not -name 'index.html' -delete
            
            # Set permissions correctly after pull
            chmod -R 777 upload/system/storage upload/image upload/admin/view/stylesheet upload/catalog/view/theme/*/stylesheet
            
            docker-compose up -d --build --force-recreate --remove-orphans
