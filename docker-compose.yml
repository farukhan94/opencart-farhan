version: '3.8'

services:
  web:
    build: .
    ports:
      - "80:80"
    volumes:
      - ./upload:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOSTNAME=db
      - DB_USERNAME=root
      - DB_PASSWORD=opencart
      - DB_DATABASE=opencart
      - DB_PORT=3306

  db:
    image: mysql:5.7
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: opencart
      MYSQL_DATABASE: opencart
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: opencart
    depends_on:
      - db

volumes:
  mysql-data:
